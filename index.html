<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/"
      }
    }
  </script>
  <title>3D Audio Spectrogram Visualiser with 3-Axis Labels</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      overflow: hidden;
    }
    #startButton {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      font-size: 18px;
      color: #000000;
      background-color: rgb(255, 255, 255);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
    }
    /* {{ ADDED: Styles for the frequency range control slider at the bottom }} */
    #controlContainer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.85);
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid #333;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      pointer-events: auto;
    }
    #freqSlider {
      width: 250px;
      cursor: pointer;
      accent-color: #fff;
    }
  </style>
</head>
<body>
  <button id="startButton">Start</button>
  <div id="controlContainer">
    <label for="freqSlider" id="sliderLabel">Max Frequency: 10.0 kHz</label>
    <input type="range" id="freqSlider" min="1000" max="22000" step="500" value="10000">
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    
    // Shift camera slightly right and up for a better perspective of the 3-axis corner
    camera.position.set(45, 55, 95);
    camera.lookAt(0, 0, 0);

    // Audio Setup
    let audioContext, analyser, dataArray, bufferLength;
    let isRecording = false;
    let targetFrequency = 10000; // {{ CHANGED: Changed to a let variable so it can be dynamically adjusted }}

    // Spectrogram Setup
    const timeSamples = 128; // Depth (Time history)
    const freqSamples = 128; // Width (Frequency bins mapped to plane)
    const width = 100;
    const depth = 100;

    let labelSprites = [];

    // Create a DataTexture to hold frequency data over time
    const size = timeSamples * freqSamples;
    const audioData = new Uint8Array(4 * size);
    const dataTexture = new THREE.DataTexture(audioData, freqSamples, timeSamples, THREE.RGBAFormat);
    dataTexture.needsUpdate = true;

    // GLSL Shaders
    const vertexShader = `
      uniform sampler2D u_audioTexture;
      varying float vElevation;

      void main() {
        vec4 texData = texture2D(u_audioTexture, uv);
        float elevation = texData.r * 25.0; 
        vElevation = elevation;

        vec3 newPosition = position;
        newPosition.y += elevation;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;

    const fragmentShader = `
      varying float vElevation;

      void main() {
        float intensity = clamp(vElevation / 25.0, 0.0, 1.0);
        
        // Define high-contrast VU-meter gradient stops:
        vec3 colorDarkGreen = vec3(0.0, 0.25, 0.0);  // Base/Silent (Prevents blinding green background)
        vec3 colorNeonGreen = vec3(0.0, 1.0, 0.0);  // Low signal (Electric Green)
        vec3 colorYellow    = vec3(1.0, 1.0, 0.0);  // Mid signal (Vibrant Yellow)
        vec3 colorRed       = vec3(1.0, 0.0, 0.0);  // High signal (Hot Red)
        
        vec3 colour;
        if (intensity < 0.33) {
          // Dark Green to Neon Green
          colour = mix(colorDarkGreen, colorNeonGreen, intensity / 0.33);
        } else if (intensity < 0.66) {
          // Neon Green to Yellow
          colour = mix(colorNeonGreen, colorYellow, (intensity - 0.33) / 0.33);
        } else {
          // Yellow to Red
          colour = mix(colorYellow, colorRed, (intensity - 0.66) / 0.34);
        }
        
        gl_FragColor = vec4(colour, 1.0);
      }
    `;

    // Create the Plane Geometry and Shader Material
    const geometry = new THREE.PlaneGeometry(width, depth, freqSamples - 1, timeSamples - 1);
    geometry.rotateX(-Math.PI / 2); // Lay it flat

    const material = new THREE.ShaderMaterial({
      uniforms: {
        u_audioTexture: { value: dataTexture }
      },
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      wireframe: true,      // Disable the wireframe to make the surface solid
      side: THREE.DoubleSide // Ensures the plane is visible from both top and bottom
    });

    const spectrogramMesh = new THREE.Mesh(geometry, material);
    scene.add(spectrogramMesh);

    // Create a dynamic, glowing solid line at the front of the graph
    const frontLineGeometry = new THREE.BufferGeometry();
    const frontLinePositions = new Float32Array(freqSamples * 3);
    for (let i = 0; i < freqSamples; i++) {
      const x = -width / 2 + (i / (freqSamples - 1)) * width;
      frontLinePositions[i * 3] = x;     // X position
      frontLinePositions[i * 3 + 1] = 0; // Y position (will be dynamic)
      frontLinePositions[i * 3 + 2] = depth / 2 + 0.1; // Z position (slightly in front of grid)
    }
    frontLineGeometry.setAttribute('position', new THREE.BufferAttribute(frontLinePositions, 3));
    
    const frontLineMaterial = new THREE.LineBasicMaterial({
      color: 0xffffff,
      linewidth: 10     
    });
    const frontLine = new THREE.Line(frontLineGeometry, frontLineMaterial);
    scene.add(frontLine);

    // Create a dynamic solid line running along the Z-axis (time history) 
    const sideLineGeometry = new THREE.BufferGeometry();
    const sideLinePositions = new Float32Array(timeSamples * 3);
    const historyAmplitudes = new Float32Array(timeSamples); // Store average amplitude per row

    for (let i = 0; i < timeSamples; i++) {
      const z = depth / 2 - (i / (timeSamples - 1)) * depth;
      sideLinePositions[i * 3] = -width / 2 - 0.2; // Slightly offset to the left of the grid
      sideLinePositions[i * 3 + 1] = 0;            // Y position (will be dynamic history)
      sideLinePositions[i * 3 + 2] = z;            // Z position
    }
    sideLineGeometry.setAttribute('position', new THREE.BufferAttribute(sideLinePositions, 3));

    const sideLineMaterial = new THREE.LineBasicMaterial({
      color: 0xffffff,
      linewidth: 10
    });
    const sideLine = new THREE.Line(sideLineGeometry, sideLineMaterial);
    scene.add(sideLine);

    // Helper to generate a line in 3D space
    function createAxisLine(start, end, colour = 0xffffff) {
      const lineGeometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(...start),
        new THREE.Vector3(...end)
      ]);
      const lineMaterial = new THREE.LineBasicMaterial({ color: colour });
      const line = new THREE.Line(lineGeometry, lineMaterial);
      scene.add(line);
      return line;
    }

    // Draw the structural 3D axis lines intersecting at the front-left corner
    createAxisLine([-width / 2, 0.1, depth / 2], [width / 2, 0.1, depth / 2]);      // X-Axis (Frequency)
    createAxisLine([-width / 2, 0, depth / 2], [-width / 2, 25, depth / 2]);       // Y-Axis (Decibels)
    createAxisLine([-width / 2, 0.1, depth / 2], [-width / 2, 0.1, -depth / 2]);   // Z-Axis (Time History)

    const startButton = document.getElementById('startButton');
    startButton.addEventListener('click', () => {
      if (!isRecording) {
        startButton.textContent = 'Stop';
        startAudio();
      } else {
        startButton.textContent = 'Start';
        stopAudio();
      }
      isRecording = !isRecording;
    });

    // {{ ADDED: Event listener to dynamically handle slider adjustments }}
    const freqSlider = document.getElementById('freqSlider');
    const sliderLabel = document.getElementById('sliderLabel');
    freqSlider.addEventListener('input', (e) => {
      targetFrequency = parseInt(e.target.value);
      sliderLabel.textContent = `Max Frequency: ${(targetFrequency / 1000).toFixed(1)} kHz`;
      
      // If audio has already started, dynamically refresh the labels
      if (audioContext && analyser) {
        generateAllAxisLabels();
      }
    });

    // Generate dynamic label sprites using Canvas 2D
    function createLabelSprite(text, x, y, z) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 32;
      const ctx = canvas.getContext('2d');
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = 'Bold 16px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(spriteMaterial);
      
      sprite.position.set(x, y, z);
      sprite.scale.set(10, 2.5, 1);
      return sprite;
    }

    function generateAllAxisLabels() {
      // Clear existing sprites
      labelSprites.forEach(sprite => scene.remove(sprite));
      labelSprites = [];

      // 1. X-AXIS LABELS (Frequency) - Map directly to the dynamic target limit
      const numXLabels = 5;
      for (let i = 0; i < numXLabels; i++) {
        const freq = (i / (numXLabels - 1)) * targetFrequency;
        const labelText = freq < 1000 ? `${Math.round(freq)} Hz` : `${(freq / 1000).toFixed(1)} kHz`;
        
        const x = -width / 2 + (i / (numXLabels - 1)) * width;
        const sprite = createLabelSprite(labelText, x, 1.5, depth / 2 + 5);
        scene.add(sprite);
        labelSprites.push(sprite);
      }

      // 2. Y-AXIS LABELS (Decibels)
      const minDb = analyser.minDecibels; // Usually -100 dB
      const maxDb = analyser.maxDecibels; // Usually -30 dB
      const dbRange = maxDb - minDb;
      const numYLabels = 5;
      for (let i = 0; i < numYLabels; i++) {
        const fraction = i / (numYLabels - 1);
        const dbVal = minDb + fraction * dbRange;
        const y = fraction * 25; // Scale offset matching the shader elevation limit (25)
        const labelText = `${Math.round(dbVal)} dB`;
        
        // Offset labels to the left of the grid
        const sprite = createLabelSprite(labelText, -width / 2 - 8, y, depth / 2 + 1);
        scene.add(sprite);
        labelSprites.push(sprite);
      }

      // 3. Z-AXIS LABELS (Time History Offset)
      const totalSeconds = (timeSamples * 16.67) / 1000;
      const numZLabels = 5;
      for (let i = 0; i < numZLabels; i++) {
        const fraction = i / (numZLabels - 1);
        const secondsAgo = fraction * totalSeconds;
        const z = depth / 2 - fraction * depth; // Progresses from front edge (Now) to back edge (Past)
        const labelText = secondsAgo === 0 ? 'Now' : `-${secondsAgo.toFixed(1)}s`;
        
        // Offset labels to the left edge of the grid
        const sprite = createLabelSprite(labelText, -width / 2 - 8, 1.5, z);
        scene.add(sprite);
        labelSprites.push(sprite);
      }
    }

    function startAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        
        analyser.fftSize = 2048; // Allows high resolution mapping up to ~40kHz sample ceiling
        analyser.minDecibels = -100;
        analyser.maxDecibels = -30;

        bufferLength = analyser.frequencyBinCount; 
        dataArray = new Uint8Array(bufferLength);

        const mediaStream = navigator.mediaDevices.getUserMedia({ audio: true });
        mediaStream.then(stream => {
          const source = audioContext.createMediaStreamSource(stream);
          source.connect(analyser);
          
          generateAllAxisLabels();
          animate();
        }).catch(err => {
          console.error('Microphone access denied:', err);
        });
      } else {
        audioContext.resume();
      }
    }

    function stopAudio() {
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      
      controls.update();

      if (isRecording && analyser) {
        analyser.getByteFrequencyData(dataArray);

        // Map the frequency range [0, 10kHz] onto the grid's 128 physical samples (downsampling/resampling)
        const targetFrequency = 10000; // 10 kHz
        const maxIndex = Math.floor((targetFrequency / audioContext.sampleRate) * analyser.fftSize);

        // Shift the old data down in the texture
        for (let i = timeSamples - 1; i > 0; i--) {
          const rowOffset = i * freqSamples * 4;
          const prevRowOffset = (i - 1) * freqSamples * 4;
          for (let j = 0; j < freqSamples * 4; j++) {
            audioData[rowOffset + j] = audioData[prevRowOffset + j];
          }
        }

        // Shift the history amplitude data back in time 
        for (let i = timeSamples - 1; i > 0; i--) {
          historyAmplitudes[i] = historyAmplitudes[i - 1];
        }

        // Copy resampled frequency bin data into row 0
        let sumAmplitude = 0;
        const linePositions = frontLineGeometry.attributes.position.array;
        for (let i = 0; i < freqSamples; i++) {
          // Linearly interpolate/map index mapping from [0, freqSamples] to [0, maxIndex]
          const mappedIndex = Math.min(
            Math.floor((i / (freqSamples - 1)) * maxIndex),
            dataArray.length - 1
          );
          const val = dataArray[mappedIndex]; 
          sumAmplitude += val;
          
          const index = i * 4;
          audioData[index] = val;     // R
          audioData[index + 1] = val; // G
          audioData[index + 2] = val; // B
          audioData[index + 3] = 255; // A

          // Update the front line Y coordinate based on current value
          const yVal = (val / 255.0) * 25.0;
          linePositions[i * 3 + 1] = yVal;
        }

        // Calculate & map the average DB / Amplitude for the newest row 
        const averageAmplitude = sumAmplitude / freqSamples;
        historyAmplitudes[0] = (averageAmplitude / 255.0) * 25.0;

        // Update the Z-axis side-line geometry positions based on history 
        const sidePositions = sideLineGeometry.attributes.position.array;
        for (let i = 0; i < timeSamples; i++) {
          sidePositions[i * 3 + 1] = historyAmplitudes[i];
        }
        
        dataTexture.needsUpdate = true;
        frontLineGeometry.attributes.position.needsUpdate = true;
        sideLineGeometry.attributes.position.needsUpdate = true;
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
